---
# Flarum 2.0 简体中文语言包
# 版本：2.0.0
# 最后更新：2026-03-26

# 前台论坛
forum:
  header:
    log_in: 登录
    sign_up: 注册
    search: 搜索
    search_placeholder: 搜索...
  nav:
    home: 首页
    discussions: 讨论
    tags: 标签
  discussion:
    start_post_button: 新建讨论
    empty_message: 还没有讨论
  post:
    edited_text: 已编辑
    reply_button: 回复
    like_button: 点赞
    liked_text: '{count} 人点赞'
  user:
    profile_button: 个人资料
    settings_button: 设置
    logout_button: 退出登录
  composer:
    submit_button: 发布
    title_placeholder: 标题
    body_placeholder: 正文...
  notification:
    tooltip: 通知
  index:
    all_discussions_button: 所有讨论
    latest_button: 最新
    no_discussions_text: 还没有讨论

# 后台管理
admin:
  navigation:
    dashboard_button: 仪表盘
    extensions_button: 扩展
    permissions_button: 权限
    settings_button: 设置
  dashboard:
    title: 仪表盘
    discussion_count: '{count} 个讨论'
    post_count: '{count} 个帖子'
    user_count: '{count} 个用户'
  extensions:
    title: 扩展
    installed_button: 已安装
    add_button: 添加扩展
  settings:
    title: 设置
    save_changes_button: 保存更改
    saved_message: 设置已保存
  permissions:
    title: 权限

# 验证
validation:
  required: '{attribute} 是必需的'
  email: 请输入有效的电子邮件地址
  min: '{attribute} 至少需要{min}个字符'
  max: '{attribute} 不能超过{max}个字符'
  unique: '{attribute} 已被使用'

# 通用
lib:
  username: 用户名
  password: 密码
  email: 电子邮件
  remember_me: 记住我
  forgot_password: 忘记密码
  reset_password: 重置密码
  cancel: 取消
  close: 关闭
  delete: 删除
  edit: 编辑
  save: 保存
  loading: 加载中...
  error: 错误
  success: 成功
  warning: 警告
  info: 信息
  confirm: 确认
  yes: 是
  no: 否
  ok: 确定

# 日期时间
date:
  today: 今天
  yesterday: 昨天
  tomorrow: 明天
  minutes_ago: '{count} 分钟前'
  hours_ago: '{count} 小时前'
  days_ago: '{count} 天前'
  just_now: 刚刚

# 错误
error:
  not_found: 未找到
  permission_denied: 权限不足
  session_expired: 会话已过期
  generic: 发生错误

# 扩展翻译
flarum-likes:
  forum:
    post:
      like_button: 点赞
      liked_text: '{count} 人点赞'

flarum-lock:
  forum:
    post:
      locked_text: 已锁定

flarum-tags:
  forum:
    index:
      more_tags_text: 更多标签

flarum-subscriptions:
  forum:
    following:
      follow_button: 关注
      unfollow_button: 取消关注

flarum-mentions:
  forum:
    post:
      mentioned_by: '{username} 提及了你'

flarum-emoji:
  forum:
    composer:
      emoji_button: 表情

flarum-flags:
  forum:
    post:
      flag_button: 举报
      flagged_text: 已举报

flarum-approval:
  forum:
    discussion:
      awaiting_approval_text: 等待审核

flarum-suspend:
  forum:
    user:
      suspended_text: 已被禁言

flarum-nicknames:
  forum:
    user:
      nickname_label: 昵称

flarum-sticky:
  forum:
    discussion:
      stickied_text: 已置顶

# Flarum 2.0 新增
flarum-messages:
  forum:
    composer:
      send_message: 发送消息
    nav:
      messages: 消息

flarum-realtime:
  forum:
    discussion:
      new_posts_text: '{count} 条新帖子'

flarum-extension-manager:
  admin:
    extensions:
      check_updates_button: 检查更新
      update_all_button: 全部更新
      install_button: 安装
