flarum-lock:

  ##
  # UNIQUE KEYS
  ##

  admin:
    permissions:
      lock_discussions_label: 锁定讨论

  forum:
    badge:
      locked_tooltip: 已锁定

    discussion_controls:
      lock_button: 锁定
      unlock_button: 解锁

    notifications:
