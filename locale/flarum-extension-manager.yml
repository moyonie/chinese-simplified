flarum-extension-manager:
  admin:
    auth_config:
      add_label: 新建认证方式
      add_modal:
        host_label: 主机
        host_placeholder: "example: bearer.flarum.org"
        submit_button: 提交
        token_label: 令牌
        type_label: 类型
        unchanged_token_placeholder: "（未更改）"
      delete_confirmation: 确定要删除此认证方式吗？
      delete_label: 删除认证方式
      edit_label: 编辑认证方式
      fields:
        host: 主机
        token: 令牌
      no_auth_methods_configured: 未配置认证方式。这是一个可选的高级功能，用于允许从私有仓库安装。
      remove_button_label: 移除认证方式
      title: 认证方式
      types:
        github-oauth: GitHub OAuth
        gitlab-oauth: GitLab OAuth
        gitlab-token: GitLab 令牌
        bearer: HTTP Bearer

    composer:
      add_repository_label: 添加仓库
      delete_repository_confirmation: 确定要删除此仓库吗？所有从该仓库安装的扩展将被移除。
      delete_repository_label: 删除仓库
      edit_repository_label: 编辑仓库
      title: Composer
      minimum_stability:
        label: 最低稳定性
        help: 允许安装的包类型。除非您知道自己在做什么，否则不要更改此设置。
        options:
          stable: 稳定版（推荐）
          rc: 候选版
          beta: 测试版
          alpha: 内测版
          dev: 开发版
      repositories:
        label: 仓库
        help: 添加额外的仓库以安装包。这是高级功能，不要添加不可信的仓库，因为它们可能用于在您的服务器上执行恶意代码。
        types:
          composer: composer
          vcs: vcs
          path: path
        add_modal:
          name_label: 名称
          type_label: 类型
          url: URL
          submit_button: 提交

    exceptions:
      composer_command_failure: 执行失败。请检查 storage/logs/composer 中的 composer 日志。
      extension_already_installed: 扩展已安装。
      extension_not_directly_dependency: 扩展作为其他扩展的依赖项安装，无法直接移除。
      extension_not_installed: 未找到扩展。

      guessed_cause:
        extension_incompatible_with_instance: 该扩展很可能与您当前的 Flarum 实例不兼容。
        extension_not_found: 未找到扩展或扩展不存在。
        extensions_incompatible_with_new_major: >
          某些已安装的扩展与最新版本不兼容。
          请等待作者更新扩展以兼容新版本，或在继续之前移除它们。

    extensions:
      check_why_it_failed_updating: 查看更新失败原因。
      install: 安装新扩展
      install_help: >
        填写扩展包名称以继续。您可以使用 <code>vendor/package-name:version</code> 格式指定<semantic_link>语义化版本</semantic_link>。
        访问 {link} 浏览可用包。
      proceed: 继续
      remove: 卸载
      successful_install: "{extension} 安装成功，正在跳转.."
      successful_remove: 扩展已成功移除。
      successful_update: "{extension} 更新成功，正在跳转.."
      update: 更新
      update_soft_label: 软更新
      update_hard_label: 硬更新

    file_permissions: >
      扩展管理器需要对以下文件和目录具有读写权限：composer.json, composer.lock, vendor, storage, storage/.composer

    major_updater:
      description: >
        Flarum 主要版本更新不向后兼容，这意味着您当前安装的某些扩展和手动修改可能在新版本中无法工作。
        请在继续前务必备份数据库和文件。
      dry_run: 试运行
      dry_run_help: 试运行模拟更新以查看当前设置是否可以安全更新，这并不意味着您手动进行的自定义修改将在新版本中工作。
      failure:
        desc: 上次主要更新失败，某些已安装的扩展与新主要版本不兼容。
        why: 了解更多

      title: Flarum {version} 主要版本更新可用
      update: 更新

    minor_update_confirmation:
      content: 这也将更新任何其他有可用更新的扩展/包。

    required_php_functions: >
      扩展管理器需要启用以下 PHP 函数：<code>{functions}</code>。
      如果您无法访问 PHP 配置，请联系您的主机提供商。

    sections:
      discover:
        description: 通过扩展为您的 Flarum 论坛添加新功能和集成。
        empty_results: 看起来没有可用的扩展。
        extension:
