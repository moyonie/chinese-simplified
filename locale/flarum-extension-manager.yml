            abandoned: 已弃用
            fof: Friends Of Flarum
            flarum: Flarum
          downloads: "{count, plural, one {{formattedCount} 次下载} other {{formattedCount} 次下载}}"
        search: 搜索...
        server_error: 服务暂时不可用，请稍后重试。
        sort:
          top: 最多下载
        tabs:
          discover: 发现
          extensions: 扩展
          languages: 语言包
          themes: 主题
        title: 扩展
      queue:
        columns:
          details: 详情
          elapsed_time: 完成时间
          peak_memory_used: 峰值内存使用
          operation: 操作
          package: 包
          status: 状态
        none: 暂无任务。
        operations:
          extension_install: 安装扩展
          extension_remove: 移除扩展
          extension_update: 更新扩展
          update_check: 检查更新
          update_global: 更新所有软件包
          update_major: 主要版本更新
          update_minor: 次要版本更新
          why_not: 分析为何无法更新包
        output_modal:
          cause_unknown: 未知
          command: Composer 命令
          guessed_cause: 原因
          output: 输出
        refresh: 刷新任务列表
        statuses:
          success: 成功
          failure: 失败
          pending: 等待中
          running: 运行中
        task_just_started: 任务刚刚开始
        title: 队列
      settings:
        title: 选项和队列
        description: 配置扩展管理器并检查队列中的操作。

    settings:
      title: => core.ref.settings
      access_warning: 请谨慎授予管理区域访问权限，扩展管理器可能被恶意行为者滥用以安装可能导致安全漏洞的包。
      debug_mode_warning: 您正在调试模式下运行，扩展管理器无法正确安装和更新本地开发包。请对此类用途使用命令行界面。
      queue_jobs: 在后台队列中运行操作
      queue_jobs_help: >
        您可以了解<basic_impl_link>基础队列</basic_impl_link>实现或<adv_impl_link>更高级</adv_impl_link>的队列实现。
        确保队列使用的 PHP 版本为 {php_version}。确保<folder_perms_link>文件夹权限</folder_perms_link>配置正确。
      task_retention_days: 任务保留天数
      task_retention_days_help: >
          在数据库中保留已完成任务的天数。超过此天数的任务将被删除。
          设置为 0 以保留所有任务。

    updater:
      up_to_date: 暂无待更新。
      check_for_updates: 检查更新
      flarum: Flarum 核心
      global_update_successful: 成功更新所有包。
      last_update_checked_at: "上次更新检查："
      run_global_update: 运行全局更新
      updater_title: 更新
      updater_help: 运行检查以获取新的扩展和 Flarum 更新。

    update_successful: Flarum 成功更新。

    why_not_modal:
      title: 为何无法更新
